<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sidra DEX</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/ethers@6.13.4/dist/ethers.min.js"></script>
</head>
<body class="bg-zinc-950 text-white min-h-screen">

  <!-- NAVBAR -->
  <nav class="border-b border-zinc-800 bg-zinc-950/90 backdrop-blur-md fixed w-full z-50">
    <div class="max-w-6xl mx-auto px-6 py-5 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-gradient-to-br from-emerald-400 to-cyan-500 rounded-3xl flex items-center justify-center text-3xl">🌐</div>
        <h1 class="text-4xl font-bold tracking-tighter">Sidra DEX</h1>
      </div>
      <div class="flex gap-3">
        <button id="connectBtn" class="px-8 py-3.5 bg-white hover:bg-zinc-100 text-black font-semibold rounded-3xl">Connect Wallet</button>
        <button id="disconnectBtn" onclick="disconnectWallet()" class="hidden px-6 py-3.5 bg-red-600 rounded-3xl">Disconnect</button>
      </div>
    </div>
  </nav>

  <div class="max-w-2xl mx-auto pt-32 pb-16 px-5">
    <div class="glass border border-zinc-700 rounded-3xl p-8 shadow-2xl">
      <!-- FROM -->
      <div class="mb-8">
        <div class="flex justify-between mb-3 text-sm text-zinc-400">
          <span>From</span>
          <span id="fromBalance">Balance: 0 SDA</span>
        </div>
        <div class="flex gap-4 bg-zinc-900 rounded-3xl p-5">
          <button id="fromTokenBtn" class="flex items-center gap-4 bg-zinc-800 px-6 py-4 rounded-3xl">
            <img id="fromLogo" src="https://placehold.co/48x48/00ffaa/000000?text=SDA" class="w-10 h-10 rounded-2xl">
            <span id="fromSymbol" class="text-2xl">SDA</span>
            <span class="text-xl text-zinc-400">▼</span>
          </button>
          <input id="fromAmount" type="text" placeholder="0.00" class="flex-1 bg-transparent text-5xl outline-none text-right">
        </div>
      </div>

      <!-- SWAP ARROW -->
      <div class="flex justify-center -mt-6 mb-6">
        <button id="swapTokensBtn" class="bg-zinc-900 border-2 border-zinc-700 w-14 h-14 rounded-3xl text-4xl">⇄</button>
      </div>

      <!-- TO -->
      <div class="mb-8">
        <div class="flex justify-between mb-3 text-sm text-zinc-400">
          <span>To</span>
          <span id="toBalance">Balance: 0</span>
        </div>
        <div class="flex gap-4 bg-zinc-900 rounded-3xl p-5">
          <button id="toTokenBtn" class="flex items-center gap-4 bg-zinc-800 px-6 py-4 rounded-3xl">
            <img id="toLogo" src="https://placehold.co/48x48" class="w-10 h-10 rounded-2xl">
            <span id="toSymbol" class="text-2xl">Select Token</span>
            <span class="text-xl text-zinc-400">▼</span>
          </button>
          <input id="toAmount" type="text" placeholder="0.00" readonly class="flex-1 bg-transparent text-5xl outline-none text-right text-emerald-400">
        </div>
      </div>

      <!-- PRICE & ESTIMATE -->
      <div id="priceInfo" class="bg-zinc-900/70 rounded-3xl p-6 text-sm mb-8 flex justify-between">
        <div>1 <span id="priceFromSymbol">SDA</span> ≈ <span id="livePrice">0.00</span> <span id="priceToSymbol"></span></div>
        <div id="estimateText" class="text-emerald-400"></div>
      </div>

      <!-- SLIPPAGE -->
      <div class="flex justify-between mb-8 text-sm">
        <span class="text-zinc-400">Slippage</span>
        <div class="flex gap-2">
          <button onclick="setSlippage(0.5)" class="px-5 py-2 bg-zinc-800 rounded-2xl text-xs">0.5%</button>
          <button onclick="setSlippage(1)" class="px-5 py-2 bg-zinc-800 rounded-2xl text-xs active">1%</button>
          <button onclick="setSlippage(2)" class="px-5 py-2 bg-zinc-800 rounded-2xl text-xs">2%</button>
        </div>
      </div>

      <!-- SWAP BUTTON -->
      <button id="swapBtn" onclick="executeSwap()" class="w-full py-6 bg-gradient-to-r from-emerald-500 to-cyan-500 text-xl font-bold rounded-3xl">Connect Wallet to Start</button>
    </div>
  </div>

  <!-- TOKEN MODAL -->
  <div id="tokenModal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-50">
    <div class="bg-zinc-900 w-full max-w-md mx-4 rounded-3xl">
      <div class="p-6 border-b flex justify-between">
        <h3 class="text-2xl font-bold">Select Token</h3>
        <button onclick="closeModal()" class="text-4xl">×</button>
      </div>
      <div class="p-4">
        <input id="searchInput" placeholder="Search token..." class="w-full bg-zinc-800 rounded-3xl px-6 py-4 text-lg">
      </div>
      <div id="tokenList" class="max-h-[420px] overflow-y-auto"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
