<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Sidra DEX</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.ethers.io/lib/ethers-6.13.umd.min.js"></script>
  <style>
    body { background: #0a0a0a; color: white; font-family: system-ui; }
    .card { background: #18181b; border-radius: 24px; }
    .input { background: #27272a; border-radius: 16px; }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
  <div class="card max-w-md w-full p-8">
    <div class="flex justify-between mb-8">
      <h1 class="text-5xl font-bold">My Sidra DEX</h1>
      <button id="connectBtn" class="bg-blue-600 hover:bg-blue-700 px-6 py-3 rounded-2xl text-sm font-medium">Connect Wallet</button>
    </div>

    <!-- Tabs -->
    <div class="flex mb-8 bg-zinc-800 rounded-2xl p-1 text-sm">
      <button onclick="switchTab(0)" id="tab0" class="flex-1 py-3 font-semibold rounded-xl bg-zinc-900">Swap</button>
      <button onclick="switchTab(1)" id="tab1" class="flex-1 py-3 font-semibold rounded-xl">Liquidity</button>
    </div>

    <div id="swapTab">
      <div class="space-y-8">
        <div>
          <p class="text-zinc-400 mb-3 text-sm">You pay</p>
          <div class="input p-5">
            <input id="amountIn" type="text" value="1" class="w-full bg-transparent text-4xl outline-none">
            <select id="tokenIn" class="mt-4 w-full bg-zinc-800 p-3 rounded-xl text-xl">
              <option value="0xe4095a910209d7be03b55d02f40d4554b1666182">WSDA</option>
              <option value="0x345b20d4fca08376f19145c36c531a1821af96c4">VPD</option>
              <option value="0xf74106911432657a24b0d85257d40f24f801cc01">MBF</option>
              <option value="0xb6f440a059d24ca305bce6f25115d09e9dbea653">ECSDA</option>
            </select>
          </div>
        </div>

        <div class="text-center text-4xl text-zinc-500">↓</div>

        <div>
          <p class="text-zinc-400 mb-3 text-sm">You receive ≈ <span id="amountOut">0.00</span></p>
          <div class="input p-5">
            <input id="amountOutDisplay" type="text" value="0.00" readonly class="w-full bg-transparent text-4xl outline-none">
            <select id="tokenOut" class="mt-4 w-full bg-zinc-800 p-3 rounded-xl text-xl">
              <option value="0x345b20d4fca08376f19145c36c531a1821af96c4">VPD</option>
              <option value="0xf74106911432657a24b0d85257d40f24f801cc01">MBF</option>
              <option value="0xb6f440a059d24ca305bce6f25115d09e9dbea653">ECSDA</option>
            </select>
          </div>
        </div>
      </div>

      <button onclick="doSwap()" id="swapBtn" class="mt-10 w-full bg-emerald-600 hover:bg-emerald-700 py-6 rounded-3xl text-2xl font-bold disabled:opacity-50">Swap Now</button>
    </div>

    <div id="liquidityTab" class="hidden">
      <div class="text-center py-12">
        <h2 class="text-3xl font-bold mb-8">Add / Remove Liquidity</h2>
        <button onclick="alert('✅ Liquidity tab ready — use NonfungiblePositionManager 0x8b9bCc8C722778f30146e20e44E8d8e28adD8df8 for full V3 pools')" class="w-full bg-emerald-600 py-5 rounded-2xl mb-4 text-xl">+ Add Liquidity</button>
        <button onclick="alert('Remove Liquidity coming soon')" class="w-full bg-red-600 py-5 rounded-2xl text-xl">- Remove Liquidity</button>
      </div>
    </div>

    <p id="status" class="text-center mt-6 text-sm text-zinc-400"></p>
  </div>

  <script>
    let provider, signer, address;
    const ROUTER = "0x35cAC72Db00e8dAC0e4f7F8A0F53D339E0cC23fb";
    const QUOTER = "0xe24929ec26cc2faD91655B3AD3C597Fd477A80F9";
    const WSDA = "0xe4095a910209d7be03b55d02f40d4554b1666182";
    const FACTORY = "0xCFE41fb5dA87916D84E7F2289087b4Ff7163cDE";
    const LIQUIDITY_MANAGER = "0x8b9bCc8C722778f30146e20e44E8d8e28adD8df8";

    const connectBtn = document.getElementById('connectBtn');
    const status = document.getElementById('status');

    connectBtn.onclick = async () => {
      if (!window.ethereum) return alert("MetaMask not installed");
      provider = new ethers.BrowserProvider(window.ethereum);
      await window.ethereum.request({method: "eth_requestAccounts"});
      await provider.send("wallet_addEthereumChain", [{ chainId: "0x17C5D", chainName: "SidraChain", nativeCurrency: {name: "SDA", symbol: "SDA", decimals: 18}, rpcUrls: ["https://node.sidrachain.com"], blockExplorerUrls: ["https://ledger.sidrachain.com"] }]);
      signer = await provider.getSigner();
      address = await signer.getAddress();
      connectBtn.innerHTML = address.slice(0,6)+"…"+address.slice(-4);
      status.textContent = "✅ Connected to SidraChain";
      document.getElementById('swapBtn').disabled = false;
    };

    async function updateQuote() {
      const amountIn = document.getElementById('amountIn').value;
      const tokenIn = document.getElementById('tokenIn').value;
      const tokenOut = document.getElementById('tokenOut').value;
      if (!amountIn || tokenIn === tokenOut) return;
      try {
        const abi = [{"inputs":[{"components":[{"name":"tokenIn","type":"address"},{"name":"tokenOut","type":"address"},{"name":"amountIn","type":"uint256"},{"name":"fee","type":"uint24"},{"name":"sqrtPriceLimitX96","type":"uint160"}],"name":"params","type":"tuple"}],"name":"quoteExactInputSingle","outputs":[{"name":"amountOut","type":"uint256"}],"stateMutability":"view","type":"function"}];
        const contract = new ethers.Contract(QUOTER, abi, provider || new ethers.JsonRpcProvider("https://node.sidrachain.com"));
        const quote = await contract.quoteExactInputSingle({ tokenIn, tokenOut, amountIn: ethers.parseUnits(amountIn, 18), fee: 3000, sqrtPriceLimitX96: 0 });
        document.getElementById('amountOut').textContent = Number(ethers.formatUnits(quote, 18)).toFixed(6);
        document.getElementById('amountOutDisplay').value = Number(ethers.formatUnits(quote, 18)).toFixed(6);
      } catch(e) {}
    }

    document.getElementById('amountIn').oninput = updateQuote;
    document.getElementById('tokenIn').onchange = updateQuote;
    document.getElementById('tokenOut').onchange = updateQuote;

    async function doSwap() {
      if (!signer) return alert("Connect wallet first");
      const amountIn = document.getElementById('amountIn').value;
      const tokenIn = document.getElementById('tokenIn').value;
      const tokenOut = document.getElementById('tokenOut').value;
      const abi = [{"inputs":[{"components":[{"name":"tokenIn","type":"address"},{"name":"tokenOut","type":"address"},{"name":"fee","type":"uint24"},{"name":"recipient","type":"address"},{"name":"deadline","type":"uint256"},{"name":"amountIn","type":"uint256"},{"name":"amountOutMinimum","type":"uint256"},{"name":"sqrtPriceLimitX96","type":"uint160"}],"name":"params","type":"tuple"}],"name":"exactInputSingle","outputs":[{"name":"amountOut","type":"uint256"}],"stateMutability":"payable","type":"function"}];
      try {
        status.textContent = "Swapping...";
        const tx = await signer.sendTransaction({ to: ROUTER, data: new ethers.Interface(abi).encodeFunctionData("exactInputSingle", [{ tokenIn, tokenOut, fee: 3000, recipient: address, deadline: Math.floor(Date.now()/1000) + 600, amountIn: ethers.parseUnits(amountIn, 18), amountOutMinimum: 0, sqrtPriceLimitX96: 0 }]), value: tokenIn === WSDA ? ethers.parseUnits(amountIn, 18) : 0 });
        await tx.wait();
        status.textContent = "✅ Swap successful!";
      } catch(e) { status.textContent = "Error: " + e.message; }
    }

    function switchTab(n) {
      document.getElementById('swapTab').classList.toggle('hidden', n===1);
      document.getElementById('liquidityTab').classList.toggle('hidden', n===0);
      document.getElementById('tab0').classList.toggle('bg-zinc-900', n===0);
      document.getElementById('tab1').classList.toggle('bg-zinc-900', n===1);
    }

    setInterval(updateQuote, 3000);
  </script>
</body>
</html>
EOF
