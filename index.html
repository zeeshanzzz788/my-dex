<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MySidraDEX - Trade on SidraChain</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/ethers@6.13.4/dist/ethers.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Space+Grotesk:wght@500;600&amp;display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
        .logo-font { font-family: 'Space Grotesk', sans-serif; }
        .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); }
        .token-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .token-card:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1); }
        .swap-button { background: linear-gradient(90deg, #00ff9d, #00b8ff); }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">
    <!-- NAVBAR -->
    <nav class="border-b border-zinc-800 bg-zinc-950/80 backdrop-blur-lg fixed w-full z-50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 bg-gradient-to-br from-emerald-400 to-cyan-400 rounded-2xl flex items-center justify-center text-2xl">🔹</div>
                <div>
                    <span class="logo-font text-3xl font-semibold tracking-tighter">MySidra<span class="text-emerald-400">DEX</span></span>
                </div>
            </div>
            
            <div class="flex items-center gap-8 text-sm font-medium">
                <a href="#" onclick="switchTab(0)" class="tab-link active text-emerald-400">Swap</a>
                <a href="#" onclick="switchTab(1)" class="tab-link">Liquidity</a>
                <a href="#" onclick="switchTab(2)" class="tab-link">Pools</a>
            </div>

            <div id="wallet-section" class="flex items-center gap-3">
                <button onclick="connectWallet()" 
                        id="connect-btn"
                        class="px-6 py-3 bg-white text-zinc-950 font-semibold rounded-2xl flex items-center gap-2 hover:bg-emerald-400 transition-all">
                    <i class="fa-solid fa-wallet"></i>
                    <span>Connect Wallet</span>
                </button>
            </div>
        </div>
    </nav>

    <div class="pt-24 pb-12 max-w-4xl mx-auto px-6">
        <!-- HERO HEADER -->
        <div class="text-center mb-10">
            <h1 class="text-5xl font-semibold logo-font tracking-tighter mb-3">
                Trade on <span class="text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-cyan-400">SidraChain</span>
            </h1>
            <p class="text-zinc-400 max-w-md mx-auto">Your own DEX • Router: <span class="font-mono text-emerald-400 text-sm">0x35cAC72Db00e8dAC0e4f7F8A0F53D339E0cC23fb</span></p>
        </div>

        <!-- SWAP CARD -->
        <div id="swap-tab" class="glass border border-zinc-800 rounded-3xl p-8 max-w-md mx-auto">
            <!-- From -->
            <div class="mb-6">
                <div class="flex justify-between text-sm mb-2">
                    <span class="text-zinc-400">From</span>
                    <span id="from-balance" class="text-zinc-500">Balance: 0.00</span>
                </div>
                <div class="flex items-center gap-4 bg-zinc-900 border border-zinc-800 rounded-2xl p-4">
                    <button onclick="openTokenModal('from')" 
                            id="from-token-btn"
                            class="flex items-center gap-3 bg-zinc-800 hover:bg-zinc-700 px-5 py-3 rounded-2xl font-medium">
                        <span id="from-symbol">SDA</span>
                        <i class="fa-solid fa-chevron-down text-xs"></i>
                    </button>
                    <input id="from-amount" 
                           type="text" 
                           placeholder="0.0" 
                           onkeyup="updateOutput()"
                           class="flex-1 bg-transparent text-3xl outline-none text-right font-medium">
                </div>
            </div>

            <!-- Swap Icon -->
            <div class="flex justify-center -my-4 relative z-10">
                <button onclick="swapTokens()" 
                        class="w-10 h-10 bg-zinc-900 border border-zinc-700 rounded-2xl flex items-center justify-center hover:rotate-180 transition-all">
                    <i class="fa-solid fa-arrow-down-up-across-line text-emerald-400"></i>
                </button>
            </div>

            <!-- To -->
            <div class="mt-6">
                <div class="flex justify-between text-sm mb-2">
                    <span class="text-zinc-400">To (estimated)</span>
                    <span id="to-balance" class="text-zinc-500">Balance: 0.00</span>
                </div>
                <div class="flex items-center gap-4 bg-zinc-900 border border-zinc-800 rounded-2xl p-4">
                    <button onclick="openTokenModal('to')" 
                            id="to-token-btn"
                            class="flex items-center gap-3 bg-zinc-800 hover:bg-zinc-700 px-5 py-3 rounded-2xl font-medium">
                        <span id="to-symbol">VPD</span>
                        <i class="fa-solid fa-chevron-down text-xs"></i>
                    </button>
                    <input id="to-amount" 
                           type="text" 
                           placeholder="0.0" 
                           readonly
                           class="flex-1 bg-transparent text-3xl outline-none text-right font-medium text-zinc-300">
                </div>
            </div>

            <!-- Rate -->
            <div class="mt-6 flex justify-between text-xs text-zinc-400">
                <span>Rate • <span id="loading-rate" class="text-emerald-400 text-[10px]">live</span></span>
                <span id="exchange-rate">1 SDA = 5.74 VPD</span>
            </div>

            <!-- Settings -->
            <div class="mt-8 flex items-center justify-between text-sm">
                <button onclick="toggleSettings()" class="flex items-center gap-2 text-zinc-400 hover:text-white">
                    <i class="fa-solid fa-sliders"></i>
                    <span id="slippage-display">Slippage 0.5%</span>
                </button>
                <div class="text-emerald-400 text-xs font-medium flex items-center gap-1">
                    <i class="fa-solid fa-bolt"></i>
                    <span>Router: 0x35cA...23fb</span>
                </div>
            </div>

            <!-- Swap Button -->
            <button onclick="executeSwap()" 
                    id="swap-main-btn"
                    class="swap-button w-full mt-8 py-5 rounded-3xl text-xl font-semibold text-black flex items-center justify-center gap-2 shadow-xl shadow-emerald-500/30">
                <span>Connect Wallet to Swap</span>
            </button>

            <!-- Info -->
            <div class="mt-6 text-[10px] text-zinc-500 flex items-center justify-center gap-4">
                <div>Powered by SidraChain • Your Router</div>
                <div class="w-px h-3 bg-zinc-700"></div>
                <div>Chain ID: 97453</div>
            </div>
        </div>

        <!-- TOKEN MODAL -->
        <div id="token-modal" onclick="if(event.target.id==='token-modal') closeTokenModal()" 
             class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-[999]">
            <div onclick="event.stopImmediatePropagation()" 
                 class="glass border border-zinc-700 rounded-3xl w-full max-w-sm mx-4 overflow-hidden">
                <div class="p-6 border-b border-zinc-700 flex items-center justify-between">
                    <span class="font-semibold text-lg">Select Token</span>
                    <button onclick="closeTokenModal()" class="text-zinc-400 hover:text-white">
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                </div>
                <div class="p-6">
                    <input id="token-search" onkeyup="filterTokens()" type="text" placeholder="Search tokens..." 
                           class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-4 text-sm outline-none">
                </div>
                <div id="token-list" class="max-h-96 overflow-y-auto px-4 pb-6">
                    <!-- JS populated -->
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==================== YOUR ROUTER ====================
        const ROUTER_ADDRESS = "0x35cAC72Db00e8dAC0e4f7F8A0F53D339E0cC23fb";
        const WETH_ADDRESS = "0xe4095a910209d7be03b55d02f40d4554b1666182"; // Official WSDA (wrapped native)
        const CHAIN_ID = 97453;
        const RPC_URL = "https://node.sidrachain.com";
        const EXPLORER = "https://ledger.sidrachain.com";

        // Standard Uniswap V2 Router ABI (minimal - works for any V2 fork)
        const ROUTER_ABI = [
            "function WETH() external pure returns (address)",
            "function getAmountsOut(uint amountIn, address[] calldata path) external view returns (uint[] memory amounts)",
            "function swapExactTokensForTokens(uint amountIn, uint amountOutMin, address[] calldata path, address to, uint deadline) external returns (uint[] memory amounts)",
            "function swapExactETHForTokens(uint amountOutMin, address[] calldata path, address to, uint deadline) external payable returns (uint[] memory amounts)",
            "function swapExactTokensForETH(uint amountIn, uint amountOutMin, address[] calldata path, address to, uint deadline) external returns (uint[] memory amounts)"
        ];

        // ERC20 ABI (for approval + balance)
        const ERC20_ABI = [
            "function approve(address spender, uint256 amount) external returns (bool)",
            "function allowance(address owner, address spender) external view returns (uint256)",
            "function balanceOf(address) external view returns (uint256)"
        ];

        let provider, signer, userAddress, routerContract;
        let fromToken = { symbol: "SDA", name: "Sidra Digital Assets", address: WETH_ADDRESS, decimals: 18, icon: "🔹" };
        let toToken = { symbol: "VPD", name: "Dining Platform Halal", address: "0x345b20d4fca08376f19145c36c531a1821af96c4", decimals: 18, icon: "🍽️" };
        let currentModalSide = "from";
        let slippage = 0.005; // 0.5%

        const tokens = [ /* same as before - kept short for space */ 
            { symbol: "SDA", name: "Sidra Digital Assets", address: WETH_ADDRESS, decimals: 18, icon: "🔹" },
            { symbol: "VPD", name: "Dining Platform Halal", address: "0x345b20d4fca08376f19145c36c531a1821af96c4", decimals: 18, icon: "🍽️" },
            { symbol: "MBF", name: "EBMOF", address: "0xf74106911432657a24b0d85257d40f24f801cc01", decimals: 18, icon: "🏦" },
            { symbol: "ECSDA", name: "ECOSIDRA", address: "0xb6f440a059d24ca305bce6f25115d09e9dbea653", decimals: 18, icon: "🌍" },
            { symbol: "ARMS", name: "Sidra Aram Travel", address: "0x9b61324f0bee10f4624fe6e75c60943b73125e81", decimals: 18, icon: "✈️" },
            { symbol: "NGEC", name: "NEWGEN GLOBAL MARKETING", address: "0x88a53e067a6d2be71248d7b660ae72cc47f82d88", decimals: 18, icon: "📣" }
        ];

        async function connectWallet() {
            if (!window.ethereum) return alert("Please install MetaMask!");
            provider = new ethers.BrowserProvider(window.ethereum);
            const accounts = await provider.send("eth_requestAccounts", []);
            userAddress = accounts[0];
            signer = await provider.getSigner();
            routerContract = new ethers.Contract(ROUTER_ADDRESS, ROUTER_ABI, signer);

            await switchToSidraChain();
            document.getElementById("connect-btn").innerHTML = `<i class="fa-solid fa-circle-check"></i> \( {userAddress.slice(0,6)}... \){userAddress.slice(-4)}`;
            updateBalances();
            document.getElementById("swap-main-btn").innerHTML = `Swap Now`;
        }

        async function switchToSidraChain() {
            try {
                await window.ethereum.request({ method: 'wallet_switchEthereumChain', params: [{ chainId: '0x' + CHAIN_ID.toString(16) }] });
            } catch (e) {
                if (e.code === 4902) {
                    await window.ethereum.request({
                        method: 'wallet_addEthereumChain',
                        params: [{ chainId: '0x' + CHAIN_ID.toString(16), chainName: 'Sidra Chain', nativeCurrency: { name: 'SDA', symbol: 'SDA', decimals: 18 }, rpcUrls: [RPC_URL], blockExplorerUrls: [EXPLORER] }]
                    });
                }
            }
        }

        async function updateBalances() {
            if (!signer) return;
            // from balance
            const balEl = document.getElementById("from-balance");
            try {
                const bal = fromToken.address === WETH_ADDRESS 
                    ? await provider.getBalance(userAddress) 
                    : await new ethers.Contract(fromToken.address, ERC20_ABI, provider).balanceOf(userAddress);
                balEl.textContent = `Balance: ${ethers.formatUnits(bal, fromToken.decimals).slice(0,8)}`;
            } catch(e) { balEl.textContent = "Balance: 0.00"; }
            // to balance (same logic)
            const balTo = document.getElementById("to-balance");
            try {
                const bal = toToken.address === WETH_ADDRESS 
                    ? await provider.getBalance(userAddress) 
                    : await new ethers.Contract(toToken.address, ERC20_ABI, provider).balanceOf(userAddress);
                balTo.textContent = `Balance: ${ethers.formatUnits(bal, toToken.decimals).slice(0,8)}`;
            } catch(e) { balTo.textContent = "Balance: 0.00"; }
        }

        // ==================== REAL QUOTE (getAmountsOut) ====================
        async function updateOutput() {
            const amt = parseFloat(document.getElementById("from-amount").value) || 0;
            if (!amt || !routerContract) {
                document.getElementById("to-amount").value = "0.0";
                return;
            }
            document.getElementById("loading-rate").textContent = "fetching...";
            try {
                const path = [fromToken.address, toToken.address];
                const amountsOut = await routerContract.getAmountsOut(
                    ethers.parseUnits(amt.toString(), fromToken.decimals), 
                    path
                );
                const out = ethers.formatUnits(amountsOut[1], toToken.decimals);
                document.getElementById("to-amount").value = parseFloat(out).toFixed(6);
                document.getElementById("exchange-rate").textContent = `1 ${fromToken.symbol} ≈ ${parseFloat(out/amt).toFixed(4)} ${toToken.symbol}`;
            } catch (err) {
                console.log("Quote failed (no pair?)", err);
                document.getElementById("exchange-rate").textContent = "No direct pair - try other token";
            }
            document.getElementById("loading-rate").textContent = "live";
        }

        // ==================== EXECUTE REAL SWAP ====================
        async function executeSwap() {
            if (!signer) return alert("Connect wallet first!");
            const amountInStr = document.getElementById("from-amount").value;
            if (!amountInStr || parseFloat(amountInStr) <= 0) return alert("Enter amount");

            const amountIn = ethers.parseUnits(amountInStr, fromToken.decimals);
            const amountOutMin = ethers.parseUnits(
                (parseFloat(document.getElementById("to-amount").value) * (1 - slippage)).toFixed(6), 
                toToken.decimals
            );
            const deadline = Math.floor(Date.now() / 1000) + 600; // 10 min
            const to = userAddress;

            const swapBtn = document.getElementById("swap-main-btn");
            swapBtn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> Approving & Swapping...`;
            swapBtn.disabled = true;

            try {
                // === APPROVAL (if ERC20) ===
                if (fromToken.address !== WETH_ADDRESS) {
                    const erc20 = new ethers.Contract(fromToken.address, ERC20_ABI, signer);
                    const allowance = await erc20.allowance(userAddress, ROUTER_ADDRESS);
                    if (allowance < amountIn) {
                        const txApprove = await erc20.approve(ROUTER_ADDRESS, ethers.MaxUint256);
                        await txApprove.wait();
                        console.log("✅ Approved");
                    }
                }

                // === EXECUTE SWAP ===
                let tx;
                const path = [fromToken.address, toToken.address];

                if (fromToken.address === WETH_ADDRESS) {
                    // Native SDA → Token
                    tx = await routerContract.swapExactETHForTokens(amountOutMin, path, to, deadline, { value: amountIn });
                } else if (toToken.address === WETH_ADDRESS) {
                    // Token → Native SDA
                    tx = await routerContract.swapExactTokensForETH(amountIn, amountOutMin, path, to, deadline);
                } else {
                    // Token → Token
                    tx = await routerContract.swapExactTokensForTokens(amountIn, amountOutMin, path, to, deadline);
                }

                const receipt = await tx.wait();
                const txHash = receipt.hash;

                alert(`✅ Swap successful on your router!\n\nTx: ${txHash}\n\nView: \( {EXPLORER}/tx/ \){txHash}`);
                
                // Refresh
                updateBalances();
                document.getElementById("from-amount").value = "";
                document.getElementById("to-amount").value = "0.0";

            } catch (err) {
                console.error(err);
                alert("Swap failed. Check console or make sure you have enough gas + tokens.");
            }

            swapBtn.innerHTML = `Swap Again`;
            swapBtn.disabled = false;
        }

        // Token modal, select, swapTokens, etc. (same as previous version - kept for brevity)
        // ... (copy the rest of the JS from previous message: openTokenModal, renderTokenList, selectToken, swapTokens, filterTokens, toggleSettings, switchTab, window.onload)

        window.onload = () => {
            // Tailwind + initial render (same as before)
            document.getElementById("from-symbol").textContent = fromToken.symbol;
            document.getElementById("to-symbol").textContent = toToken.symbol;
            console.log("%c✅ Your router 0x35cAC72Db00e8dAC0e4f7F8A0F53D339E0cC23fb connected!", "color:#00ff9d");
        };
    </script>
</body>
</html>
