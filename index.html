
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sidra DEX</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.ethers.io/lib/ethers-6.13.umd.min.js"></script>
  <style>
    body { background: #000; color: #fff; font-family: system-ui; }
    .card { background: #18181b; border-radius: 24px; }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
  <div class="card max-w-md w-full p-8">
    <div class="flex justify-between items-center mb-8">
      <h1 class="text-4xl font-bold">Sidra DEX</h1>
      <button id="connectBtn" class="bg-blue-600 hover:bg-blue-700 px-6 py-3 rounded-2xl text-sm font-medium">
        Connect MetaMask
      </button>
    </div>

    <div class="space-y-6">
      <!-- Pay -->
      <div>
        <p class="text-zinc-400 text-sm mb-2">You pay</p>
        <div class="flex gap-3">
          <input id="amountIn" type="text" value="1" class="flex-1 bg-zinc-900 text-3xl p-4 rounded-2xl focus:outline-none">
          <select id="tokenIn" class="bg-zinc-900 p-4 rounded-2xl text-xl">
            <option value="0xe4095a910209d7be03b55d02f40d4554b1666182">WSDA</option>
          </select>
        </div>
      </div>

      <div class="text-center text-zinc-500">↓</div>

      <!-- Receive -->
      <div>
        <p class="text-zinc-400 text-sm mb-2">You receive</p>
        <div class="flex gap-3">
          <input id="amountOut" type="text" value="..." readonly class="flex-1 bg-zinc-900 text-3xl p-4 rounded-2xl focus:outline-none">
          <select id="tokenOut" class="bg-zinc-900 p-4 rounded-2xl text-xl">
            <option value="0xYourTokenAddressHere">Your Token (change this)</option>
          </select>
        </div>
      </div>
    </div>

    <button id="swapBtn" class="mt-10 w-full bg-green-600 hover:bg-green-700 py-5 rounded-3xl text-2xl font-semibold disabled:opacity-50">
      Swap
    </button>

    <p id="status" class="text-center text-sm mt-4 text-zinc-400"></p>
  </div>

  <script>
    const ROUTER = "0x35cAC72Db00e8dAC0e4f7F8A0F53D339E0cC23fb";
    const QUOTER = "0xe24929ec26cc2faD91655B3AD3C597Fd477A80F9";
    const WSDA = "0xe4095a910209d7be03b55d02f40d4554b1666182";
    let provider, signer, address;

    const connectBtn = document.getElementById('connectBtn');
    const swapBtn = document.getElementById('swapBtn');
    const status = document.getElementById('status');

    connectBtn.onclick = async () => {
      if (!window.ethereum) return alert("MetaMask not found");
      provider = new ethers.BrowserProvider(window.ethereum);
      await provider.send("wallet_addEthereumChain", [{
        chainId: "0x17C5D", // 97453 in hex
        chainName: "SidraChain",
        nativeCurrency: { name: "SDA", symbol: "SDA", decimals: 18 },
        rpcUrls: ["https://node.sidrachain.com"],
        blockExplorerUrls: ["https://ledger.sidrachain.com"]
      }]);
      await window.ethereum.request({ method: "eth_requestAccounts" });
      signer = await provider.getSigner();
      address = await signer.getAddress();
      connectBtn.textContent = address.slice(0,6) + "..." + address.slice(-4);
      swapBtn.disabled = false;
      status.textContent = "Connected ✓";
    };

    swapBtn.onclick = async () => {
      const amountIn = document.getElementById('amountIn').value;
      const tokenIn = document.getElementById('tokenIn').value;
      const tokenOut = document.getElementById('tokenOut').value;

      if (!signer) return alert("Connect wallet first");

      status.textContent = "Swapping...";
      const abi = [{
        "inputs": [{"components": [
          {"name":"tokenIn","type":"address"},
          {"name":"tokenOut","type":"address"},
          {"name":"fee","type":"uint24"},
          {"name":"recipient","type":"address"},
          {"name":"deadline","type":"uint256"},
          {"name":"amountIn","type":"uint256"},
          {"name":"amountOutMinimum","type":"uint256"},
          {"name":"sqrtPriceLimitX96","type":"uint160"}
        ],"name":"params","type":"tuple"}],
        "name":"exactInputSingle",
        "outputs":[{"name":"amountOut","type":"uint256"}],
        "stateMutability":"payable",
        "type":"function"
      }];

      try {
        const tx = await signer.sendTransaction({
          to: ROUTER,
          data: new ethers.Interface(abi).encodeFunctionData("exactInputSingle", [{
            tokenIn,
            tokenOut,
            fee: 3000,
            recipient: address,
            deadline: Math.floor(Date.now()/1000) + 600,
            amountIn: ethers.parseUnits(amountIn, 18),
            amountOutMinimum: 0,
            sqrtPriceLimitX96: 0
          }]),
          value: tokenIn === WSDA ? ethers.parseUnits(amountIn, 18) : 0
        });
        await tx.wait();
        status.textContent = "✅ Swap successful!";
      } catch (e) {
        status.textContent = "Error: " + e.message;
      }
    };
  </script>
</body>
</html>
EOF
